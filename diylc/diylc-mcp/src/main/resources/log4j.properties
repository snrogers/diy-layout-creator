# diylc-mcp logging. CRITICAL: the appender targets System.err, never System.out — stdout is the
# JSON-RPC protocol channel and any stray byte there corrupts the MCP transport.
log4j.rootLogger=WARN, stderr

log4j.appender.stderr=org.apache.log4j.ConsoleAppender
log4j.appender.stderr.Target=System.err
log4j.appender.stderr.layout=org.apache.log4j.PatternLayout
log4j.appender.stderr.layout.ConversionPattern=[diylc-mcp] %-5p %c{1} - %m%n
